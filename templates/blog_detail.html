{% extends "base.html" %}

{% block content %}
<div class="bg-white min-h-screen py-12">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <a href="{{ url_for('insights') }}#blogs" class="inline-flex items-center text-slate-500 hover:text-sky-600 transition-colors mb-8">&larr; Back to Insights</a>
    <div class="mb-8">
      <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-sky-100 text-sky-800 mb-4">{{ blog.category }}</span>
      <h1 class="text-3xl md:text-5xl font-bold text-slate-900 mb-6 leading-tight">{{ blog.title }}</h1>
      <div class="flex items-center justify-between border-b border-slate-200 pb-8">
        <div class="flex items-center gap-6">
          <div class="flex items-center text-slate-600">
            <div class="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center mr-3 text-slate-500 font-bold">{{ blog.author[0] }}</div>
            <div>
              <p class="text-sm font-bold text-slate-900">{{ blog.author }}</p>
              <p class="text-xs text-slate-500">Neargoal Analyst</p>
            </div>
          </div>
          <div class="flex items-center text-sm text-slate-500">{{ blog.date_label }}</div>
        </div>
      </div>
    </div>
    <div class="mb-10 rounded-xl overflow-hidden">
      <img src="{{ blog.image }}" alt="{{ blog.title }}" class="w-full h-auto object-cover" referrerpolicy="no-referrer" />
    </div>
    <div class="prose prose-lg prose-slate max-w-none">
      {{ blog.content|safe }}
    </div>
    <div class="mt-12 pt-8 border-t border-slate-200">
      <div class="flex items-center gap-2 text-sm text-slate-500">Tags: {{ blog.tags|join(', ') }}</div>
    </div>
  </div>
</div>
{% endblock %}
