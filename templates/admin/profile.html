<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" href="" type="image/x-icon">
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">

    <title>Dashboard</title>

    {% include 'admin/head_foot/style.html' %}

</head>

<body>
    <div id="app">
        <div class="main-wrapper">

            <div class="navbar-bg"></div>

            {% include 'admin/head_foot/head.html' %}}


            <div class="main-content">
                <section class="section">
                    <div class="section-header">
                        <h1>Edit Profile</h1>
                        <div class="section-header-breadcrumb">
                            <div class="breadcrumb mb-0">
                                <div class="breadcrumb-item"><a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
                                </div>
                                <div class="breadcrumb-item active" aria-current="page">Edit Profile</div>
                            </div>
                        </div>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-12">
                                <div class="card profile-widget">
                                    <div class="profile-widget-description">
                                        <form action="{{ url_for('admin.profile_update') }}" method="POST"
                                            enctype="multipart/form-data">

                                            <div class="form-group col-12">
                                                <label>Existing Image</label>
                                                <div class="image-preview"
                                                    style="background-image:url('{{ url_for('static', filename='admin/assets/img/user/' ~ profile.profile_image) if profile.profile_image else url_for('static', filename='admin/assets/img/admin/avatar.webp') }}')">
                                                    <label for="image-upload">Update Image</label>
                                                    <input type="file" name="image" id="image-upload">
                                                </div>
                                            </div>

                                            <div class="form-group col-12">
                                                <label>Name *</label>
                                                <input type="text" name="name" value="{{ profile.full_name }}"
                                                    class="form-control" required>
                                            </div>

                                            <div class="form-group col-12">
                                                <label>Email *</label>
                                                <input type="email" name="email" value="{{ profile.email }}"
                                                    class="form-control" required>
                                            </div>

                                            <button class="btn btn-success">
                                                <i class="fa fa-sync"></i> Update Profile
                                            </button>
                                        </form>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="section-body">
                        <div class="row">
                            <div class="col-12">
                                <div class="card ">
                                    <div class="card-body">
                                        <form action="{{ url_for('admin.update_password') }}" method="POST">

                                            <div class="form-group col-12">
                                                <label>Current Password *</label>
                                                <input type="password" name="current_password" class="form-control"
                                                    required>
                                            </div>

                                            <div class="form-group col-12">
                                                <label>New Password *</label>
                                                <input type="password" name="new_password" class="form-control"
                                                    required>
                                            </div>

                                            <div class="form-group col-12">
                                                <label>Confirm Password *</label>
                                                <input type="password" name="confirm_password" class="form-control"
                                                    required>
                                            </div>

                                            <button class="btn btn-success">
                                                <i class="fa fa-sync"></i> Update Password
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>



    {% include 'admin/head_foot/script.html' %}


</body>

</html>
