<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" href="" type="image/x-icon">
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">

    <title>Dashboard</title>

    {% include 'admin/head_foot/style.html' %}

</head>

<body>
    <div id="app">
        <div class="main-wrapper">

            <div class="navbar-bg"></div>

            {% include 'admin/head_foot/head.html' %}



            <form method="POST" enctype="multipart/form-data" style="padding:24px;">

                {% if member %}
                <input type="hidden" name="existing_image" value="{{ member.profile_image }}">
                {% endif %}

                <!-- BASIC INFO -->
                <h5 class="mb-3">Basic Details</h5>

                <div class="row">
                    <div class="col-md-6 mb-2">
                        <label>Name *</label>
                        <input type="text" name="name" class="form-control" value="{{ member.name if member }}"
                            required>
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Designation *</label>
                        <input type="text" name="designation" class="form-control"
                            value="{{ member.designation if member }}" required>
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Department</label>
                        <input type="text" name="department" class="form-control"
                            value="{{ member.department if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" value="{{ member.email if member }}">
                    </div>
                </div>

                <!-- PROFILE IMAGE -->
                <div class="mb-3">
                    <label>Profile Image</label>

                    {% if member and member.profile_image %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename=member.profile_image) }}"
                            style="max-height:120px;border-radius:6px;">
                    </div>
                    {% endif %}

                    <input type="file" name="profile_image" class="form-control">
                </div>

                <!-- BIO -->
                <div class="mb-3">
                    <label>Bio</label>
                    <textarea name="bio" rows="4" class="form-control">{{ member.bio if member }}</textarea>
                </div>

                <!-- SOCIAL LINKS -->
                <h5 class="mt-4 mb-3">Social Links</h5>

                <div class="row">
                    <div class="col-md-6 mb-2">
                        <label>LinkedIn URL</label>
                        <input type="url" name="linkedin_url" class="form-control"
                            value="{{ member.linkedin_url if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Facebook URL</label>
                        <input type="url" name="facebook_url" class="form-control"
                            value="{{ member.facebook_url if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Instagram URL</label>
                        <input type="url" name="instagram_url" class="form-control"
                            value="{{ member.instagram_url if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Twitter / X URL</label>
                        <input type="url" name="twitter_url" class="form-control"
                            value="{{ member.twitter_url if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>GitHub URL</label>
                        <input type="url" name="github_url" class="form-control"
                            value="{{ member.github_url if member }}">
                    </div>

                    <div class="col-md-6 mb-2">
                        <label>Other URL</label>
                        <input type="url" name="other_url" class="form-control"
                            value="{{ member.other_url if member }}">
                    </div>
                </div>

                <!-- DISPLAY & STATUS -->
                <h5 class="mt-4 mb-3">Display Settings</h5>

                <div class="row align-items-center">
                    <div class="col-md-4 mb-2">
                        <label>Display Order</label>
                        <input type="number" name="display_order" class="form-control"
                            value="{{ member.display_order if member else 0 }}">
                    </div>

                    <div class="col-md-4 mb-2 mt-4">
                        <label>
                            <input type="checkbox" name="is_active" value="1" {% if member and member.is_active
                                %}checked{% endif %}>
                            Active
                        </label>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">
                        <i class="fa fa-save"></i> Save
                    </button>

                    <button type="button" class="btn btn-secondary"
                        onclick="window.parent.bootstrap.Modal.getInstance(window.frameElement.closest('.modal')).hide()">
                        Close
                    </button>
                </div>

            </form>



            {% include 'admin/head_foot/script.html' %}

</body>

</html>
