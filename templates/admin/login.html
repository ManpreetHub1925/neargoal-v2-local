<!DOCTYPE html>
<html lang="en">

<head>
    <title>Admin Console Neargoal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--===============================================================================================-->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.svg') }}" />

    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
/>


    <!--===============================================================================================-->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='admin/assets/css/login.css') }}">
    <!--===============================================================================================-->
    <meta name="robots" content="noindex, follow">
</head>

<body>

    <div class="limiter">
        <div class="container-login100">
            <div class="wrap-login100">
                <div class="login100-pic js-tilt" data-tilt>
                    <img src="{{ url_for('static', filename='images/primary-logo5.png') }}" alt="Neargoal Logo">
                </div>

                <form class="login100-form validate-form" method="POST" action="{{ url_for('admin.login') }}">
                    
                    <span class="login100-form-title" style="font-weight: 800;">
                        Login to Admin Console
                    </span>

                    <div class="wrap-input100 validate-input" data-validate="Valid email is required">
                        <input class="input100" type="email" name="email" placeholder="Email" autocomplete="email" required>
                        <span class="focus-input100"></span>
                        <span class="symbol-input100">
                            <i class="fa fa-envelope"></i>
                        </span>
                    </div>

                    <div class="wrap-input100 validate-input" data-validate="Password is required">
                        <input class="input100" type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                        <span class="focus-input100"></span>
                        <span class="symbol-input100">
                            <i class="fa fa-lock"></i>
                        </span>
                    </div>

                    <div class="container-login100-form-btn">
                        <button type="submit" class="login100-form-btn">
                            Login
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>



    <!--===============================================================================================-->
    <script src="{{ url_for('static', filename='admin/assets/js/login.js') }}"></script>

</body>

</html>
