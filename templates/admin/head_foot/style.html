<style>

  .main-sidebar .sidebar-brand {

  /* Micro-interactions for dropdowns */

  }

  /* Dropdown styling */

    background-color: transparent !important;

    font-weight: 500;

  .main-sidebar .sidebar-menu li ul.dropdown-menu li.active a {

    background-color: var(--sidebar-active-bg) !important;
  }

  /* Main Layout Spacing */
  .main-content {
    padding-top: 100px !important; /* Increased top padding to clear navbar */
    padding-left: var(--sidebar-width);
    padding-right: 30px;
    padding-bottom: 40px;

    z-index: 890;
    background-color: #ffffff;

    align-items: center;
    padding: 0 25px;

  }

  /* Sidebar Styles */
  .main-sidebar {
    width: var(--sidebar-width);
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;

  /* Hamburger Menu Button */

    align-items: center;
    justify-content: center;
    border-radius: 10px;

  [data-toggle="sidebar"]:hover {
    background: var(--admin-primary);
    color: #ffffff;
    box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);

  /* Mobile Responsiveness */
  @media (max-width: 1024px) {
    .main-sidebar {
      left: calc(var(--sidebar-width) * -1);

  /* Section Headers */
  .section-header {

    box-shadow: none !important;
    padding: 0 0 24px 0 !important;
    margin-bottom: 0 !important;

    align-items: center;

  .section-header h1 {
    font-size: 24px;

  /* Cards Redesign */
  .card {

  .card-statistic-1 .card-icon {

  .card-statistic-1 .card-wrap {

  .card-statistic-1 .card-header {

  .card-statistic-1 .card-body {
    padding: 0 !important;
    font-size: 20px;
    font-weight: 800;
    color: var(--admin-text);
    letter-spacing: -0.01em;
  }

  /* Footer Redesign */
  .main-footer {
    padding: 40px 0;
    margin-top: 60px;
    border-top: 1px solid var(--admin-border);
    color: var(--admin-muted);

  }

  .main-footer a {

    font-weight: 600;
    text-decoration: none;
  }

  }

  /* Professional Buttons */
  .btn {
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;

  }

  .btn-primary {
    background-color: var(--admin-primary);
    border-color: var(--admin-primary);

  .btn-primary:hover {
    background-color: #1d4ed8;
    border-color: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3), 0 2px 4px -1px rgba(37, 99, 235, 0.1);

  /* Badges */
  .badge {
    padding: 6px 12px;

    font-size: 10px;

    letter-spacing: 0.05em;

  }

  .bg-success { background-color: #00ab66 !important; color: #ffffff !important; }
  .bg-primary { background-color: #4361ee !important; color: #ffffff !important; }
  .bg-warning { background-color: #ff9f1c !important; color: #ffffff !important; }
  .bg-danger { background-color: #ef233c !important; color: #ffffff !important; }
  .bg-info { background-color: #00b4d8 !important; color: #ffffff !important; }
  .bg-secondary { background-color: #6c757d !important; color: #ffffff !important; }
  .bg-dark { background-color: #1a1f36 !important; color: #ffffff !important; }

  /* Data Tables */
  .table-responsive {
    border-radius: 12px;
  }

  .table {
    margin-bottom: 0;
    width: 100%;
  }

  .table:not(.table-sm) thead th {
    background-color: var(--admin-primary);
    color: #ffffff;
    border: none;
    padding: 16px 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .table tbody td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--admin-border);

    background-color: rgba(67, 97, 238, 0.03);
  }

  .table tbody tr:hover {
    background-color: rgba(67, 97, 238, 0.06) !important;
  }

  /* Professional Form Components */
  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label, label {
    display: block;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
    font-size: 13px;
    letter-spacing: 0.01em;
  }

  .form-control, .form-select {
    display: block;
    width: 100%;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    color: #1e293b;
    background-color: #ffffff;
    background-clip: padding-box;
    border: 1.5px solid #e2e8f0;
    appearance: none;
    border-radius: 10px;
    transition: all 0.2s ease;
  }

  .form-control:focus, .form-select:focus {
    color: #1e293b;
    background-color: #fff;
    border-color: var(--admin-primary);
    outline: 0;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
  }

  .form-control::placeholder {
    color: #94a3b8;
    opacity: 1;
  }

  .input-group {
    position: relative;
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
    width: 100%;
  }

  .input-group > .form-control,
  .input-group > .form-select {
    position: relative;
    flex: 1 1 auto;
    width: 1%;
    min-width: 0;
  }

  .input-group-text {
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: #64748b;
    text-align: center;
    white-space: nowrap;
    background-color: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
  }

  .input-group > :not(:first-child) {
    margin-left: -1.5px;
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }

  .input-group > :not(:last-child) {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }

  /* Custom Switches/Toggles */
  .form-switch {
    padding-left: 2.5em;
    min-height: 24px;
  }

  .form-switch .form-check-input {
    width: 2.2em;
    height: 1.2em;
    margin-left: -2.5em;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='rgba%280, 0, 0, 0.25%29'/%3e%3c/svg%3e");
    background-position: left center;
    border-radius: 2em;
    transition: background-position 0.15s ease-in-out;
    cursor: pointer;
  }

  .form-switch .form-check-input:checked {
    background-position: right center;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3c/svg%3e");
    background-color: #10b981;
    border-color: #10b981;
  }

  .text-primary { color: #2563eb !important; }
  .border-bottom { border-bottom: 1px solid #e2e8f0 !important; }
  
  /* Sections in Forms */
  h6.text-primary {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 1rem;
  }

  /* Force background scroll lock when modal is open */
  body.modal-open {
    overflow: hidden !important;
    padding-right: 0 !important;
  }

  /* Modals - Total Rework for Scrollability */
  .modal {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(4px);
    overflow-y: auto !important;
  }

  .modal-dialog {
    margin: 1.75rem auto;
    display: flex;
    align-items: center;
    min-height: calc(100% - 3.5rem);
  }

  .modal-content {
    border-radius: 16px;
    border: none;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    width: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    pointer-events: auto;
    background-color: #fff;
    max-height: none !important; /* Allow content to dictate height */
  }

  .modal-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--admin-border);
    background: #fff;
    border-radius: 16px 16px 0 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .modal-body {
    padding: 32px;
    overflow-y: visible !important; /* Let the modal itself scroll */
    flex: 1 1 auto;
  }

  .modal-content.form-modal-shell {
    overflow: hidden !important;
  }

  .modal-body.modal-form-scroll {
    overflow-x: auto !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  .modal-body.modal-form-scroll .modal-form-layout {
    min-width: var(--modal-form-min-width, 100%);
  }

  .modal-footer {
    padding: 20px 32px;
    border-top: 1px solid var(--admin-border);
    background: #f8fafc;
    border-radius: 0 0 16px 16px;
    position: sticky;
    bottom: 0;
    z-index: 10;
  }

  /* Ensure Quill editors don't push modal out of bounds */
  .ql-container.ql-snow {
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
  }

  .ql-editor {
    min-height: 200px;
    max-height: none; /* Let them expand naturally within the scrolling modal */
  }

  .report-editor {
    margin-bottom: 10px;
  }

  /* Fix for main wrapper scrolling */
  .main-wrapper, #app {
    height: auto !important;
    overflow: visible !important;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  ::-webkit-scrollbar-track {
    background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }

  /* Image Upload & Preview */
  .image-preview {
    position: relative;
    width: 100%;
    height: 150px;
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
