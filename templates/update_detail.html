{% extends "base.html" %}

{% block content %}
<div class="bg-white min-h-screen py-12">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-8">
      <a href="{{ url_for('market_updates') }}" class="inline-flex items-center text-slate-500 hover:text-sky-600 transition-colors mb-6">&larr; Back to Market Updates</a>
      <div class="flex items-center gap-3 mb-4">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-sky-100 text-sky-800">{{ update.category }}</span>
        <span class="flex items-center text-sm text-slate-500">{{ update.date_label }}</span>
      </div>
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-6 leading-tight">{{ update.title }}</h1>
    </div>
    <div class="prose prose-lg prose-slate max-w-none">
      {{ update.content|safe }}
    </div>
    <div class="mt-12 pt-8 border-t border-slate-200 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-sm text-slate-500">Tags: {{ update.tags|join(', ') }}</span>
      </div>
    </div>
  </div>
</div>
{% endblock %}
